name: CI

# "on" = quand est-ce que ce fichier se déclenche. Ici : à chaque push sur
# main, et à chaque pull request (peu importe la branche cible/source).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Un "job" tourne sur une machine virtuelle fraîche (un "runner"), de
  # zéro, à chaque fois. Rien n'est partagé avec ton Mac : il faut tout
  # réinstaller (Python, dépendances...) à chaque run.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # "uses" = on réutilise une action déjà écrite par quelqu'un d'autre
      # (ici l'équipe uv), au lieu de réécrire les commandes d'install à la main.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest

  # Job séparé : on vérifie juste que l'image Docker se construit toujours.
  # Les deux jobs tournent en parallèle (runners différents), donc ça ne
  # ralentit pas la CI.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t rip-agent-api:ci .
